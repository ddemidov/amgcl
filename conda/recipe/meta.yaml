{% set raw_git_tag = environ.get('GIT_DESCRIBE_TAG', 'v1.4.5') %}
{% set version = raw_git_tag[1:] if raw_git_tag.startswith('v') else raw_git_tag %}

package:
  name: amgcl
  version: {{ version }}

source:
  path: ../..

build:
  number: 0
  skip: True  # [win]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - cmake
  host:
    - boost-cpp
    - cmake
  run:
    - boost-cpp

test:
  requires:
    - cmake
  commands:
    - test -f "$PREFIX/share/amgcl/cmake/amgcl-config.cmake"
    - test -f "$PREFIX/include/amgcl/amgcl.hpp"
    - |
      TEST_DIR="$(mktemp -d)/amgcl-find-test"
      mkdir -p "$TEST_DIR"
      printf '%s\n' \
        'cmake_minimum_required(VERSION 3.5)' \
        'project(amgcl_find_package_test LANGUAGES CXX)' \
        'find_package(amgcl REQUIRED)' > "$TEST_DIR/CMakeLists.txt"
      cmake -S "$TEST_DIR" -B "$TEST_DIR/build"

about:
  home: https://github.com/OpFlow-dev/amgcl
  license: MIT
  summary: AMGCL is a header-only C++ library for solving sparse linear systems.
  description: |
    C++ library for Algebraic Multigrid with CMake package exports.
    This recipe installs headers and CMake package configuration.
